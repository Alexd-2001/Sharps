<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#020617"/>
<title>The League</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:#020617;color:#e2e8f0;min-height:100vh}
input,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer;background:none;border:none}
input,select{outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#1e3a2f;border-radius:99px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Config ────────────────────────────────────────────────────
// After deploying to Vercel, paste your URL here OR in Setup tab
const HARDCODED_BACKEND = "";  // e.g. "https://my-league.vercel.app"

// ── Storage ───────────────────────────────────────────────────
const LS = {
  g: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  s: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

// ── Helpers ───────────────────────────────────────────────────
let _id = Date.now();
const uid = () => `${_id++}_${Math.random().toString(36).slice(2,5)}`;
const fo = o => (!o && o !== 0) ? "—" : o > 0 ? `+${o}` : String(o);
const ip = o => !o ? .5 : o > 0 ? 100/(o+100) : Math.abs(o)/(Math.abs(o)+100);
const cw = (u,o) => { const n=parseInt(o); if(!n||isNaN(n)) return u; return n>0?+(u*n/100).toFixed(1):+(u*100/Math.abs(n)).toFixed(1); };
const rc = r => r==="Win"?"#22c55e":r==="Loss"?"#ef4444":r==="Push"?"#64748b":"#475569";
const AV = ["#7c3aed","#0369a1","#0f766e","#b45309","#be123c","#1d4ed8","#047857","#9333ea"];
const ac = n => AV[(n?.charCodeAt(0)||0)%AV.length];
const SE = {NBA:"🏀",NFL:"🏈",MLB:"⚾",NHL:"🏒",NCAAB:"🏀",NCAAF:"🏈",MLS:"⚽","UFC/MMA":"🥊",Tennis:"🎾",Golf:"⛳",Other:"🎯"};
const SMAP = {NBA:"basketball_nba",NFL:"americanfootball_nfl",MLB:"baseball_mlb",NHL:"icehockey_nhl",NCAAB:"basketball_ncaab",NCAAF:"americanfootball_ncaaf",MLS:"soccer_usa_mls"};
const ALL_SP = ["NFL","NBA","MLB","NHL","NCAAF","NCAAB","UFC/MMA","MLS","Tennis","Golf","Other"];
const PIN = "1234";
const DEF = {leagueName:"The League",startingUnits:100,maxBet:25,buyIn:20,sport:"NBA"};

function inferSport(bet) {
  if (bet.sport && bet.sport !== "Other") return bet.sport;
  const d = (bet.description||"").toLowerCase();
  if (/ufc|mma/.test(d)) return "UFC/MMA";
  if (/chiefs|eagles|nfl|touchdown/.test(d)) return "NFL";
  if (/lakers|celtics|warriors|nba/.test(d)) return "NBA";
  if (/yankees|dodgers|mlb/.test(d)) return "MLB";
  if (/bruins|nhl|puck/.test(d)) return "NHL";
  if (/soccer|mls/.test(d)) return "MLS";
  return "Other";
}

// ── API ───────────────────────────────────────────────────────
function getBackend() {
  return HARDCODED_BACKEND || LS.g("blg:backend") || "";
}

async function fetchOdds(sport, type="odds") {
  const base = getBackend();
  if (!base) return { data: null, error: "no_backend" };
  try {
    const r = await fetch(`${base}/api/odds?sport=${sport}&type=${type}`, {
      signal: AbortSignal.timeout(15000)
    });
    const json = await r.json();
    if (!r.ok) return { data: null, error: json.error || `HTTP ${r.status}` };
    return { data: json, error: null };
  } catch (e) {
    return { data: null, error: e.name === "TimeoutError" ? "timeout" : e.message };
  }
}

// ── State ─────────────────────────────────────────────────────
const S = {
  screen: "splash",
  player: null, isComm: false, tab: "board",
  players: LS.g("blg:players") || [],
  bets:    LS.g("blg:bets")    || [],
  weeks:   LS.g("blg:weeks")   || [],
  week:    LS.g("blg:week")    || 1,
  cfg:    { ...DEF, ...(LS.g("blg:cfg") || {}) },
  lines: [], linesLoading: false, linesError: null, linesSport: null,
  syncing: false, toast: null, _tt: null,
  modal: null, slip: null,
  histView: "weeks", histSport: null, betFilter: "All",
};

function save() {
  LS.s("blg:players", S.players); LS.s("blg:bets", S.bets);
  LS.s("blg:weeks", S.weeks);     LS.s("blg:week", S.week);
  LS.s("blg:cfg", S.cfg);
}

// ── DOM ───────────────────────────────────────────────────────
function h(tag, p={}, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(p)) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of kids.flat(9)) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
const D = (p,...k) => h("div",p,...k);
const S2 = (p,...k) => h("span",p,...k);
const B = (p,...k) => h("button",p,...k);
const I = p => h("input",p);
const SL = (p,...k) => h("select",p,...k);

// ── Render ────────────────────────────────────────────────────
function render() { const r=document.getElementById("root"); r.innerHTML=""; r.appendChild(build()); }

function toast(msg, type="ok") {
  if (S._tt) clearTimeout(S._tt);
  S.toast = {msg,type};
  render();
  S._tt = setTimeout(() => { S.toast=null; render(); }, 3500);
}

// ── Computed ──────────────────────────────────────────────────
function bal(pid, w=S.week) {
  let b = S.cfg.startingUnits;
  S.bets.filter(x=>x.playerId===pid&&x.week===w).forEach(x=>{
    if(x.result==="Win") b+=cw(x.units,x.odds);
    else if(x.result==="Loss") b-=x.units;
  });
  return +b.toFixed(1);
}
function board() {
  const wb=S.bets.filter(b=>b.week===S.week);
  return S.players.map(p=>({...p,bal:bal(p.id),bets:wb.filter(b=>b.playerId===p.id)})).sort((a,b)=>b.bal-a.bal);
}
function wb() { return S.bets.filter(b=>b.week===S.week); }

// ── Build ─────────────────────────────────────────────────────
function build() {
  if (S.screen==="splash") return buildSplash();
  if (S.screen==="select") return buildSelect();
  return buildShell();
}

// ═══════════════════════════════════════
// SPLASH
// ═══════════════════════════════════════
function buildSplash() {
  const hasBackend = !!getBackend();
  const w = D({style:{minHeight:"100vh",background:"#020617",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}});
  w.appendChild(D({style:{position:"fixed",inset:0,background:"radial-gradient(ellipse 80% 60% at 50% 0%,rgba(20,83,45,.55),transparent 70%)",pointerEvents:"none"}}));
  w.appendChild(D({style:{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(30,58,47,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,47,.15) 1px,transparent 1px)",backgroundSize:"48px 48px",pointerEvents:"none"}}));
  const c = D({style:{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",padding:"40px 24px",gap:"16px",maxWidth:"420px",width:"100%"}});
  c.appendChild(D({style:{fontSize:"56px",filter:"drop-shadow(0 0 32px rgba(34,197,94,.5))"}},"🏆"));
  c.appendChild(h("h1",{style:{fontSize:"30px",fontWeight:800,color:"#f1f5f9",letterSpacing:"-1px"}},S.cfg.leagueName));
  c.appendChild(D({style:{fontSize:"11px",color:"#4ade80",fontWeight:700,letterSpacing:".12em",textTransform:"uppercase"}},"Weekly Betting League"));
  const row = D({style:{display:"flex",width:"100%",background:"rgba(15,23,42,.9)",border:"1px solid rgba(30,58,47,.8)",borderRadius:"16px",padding:"14px 0"}});
  [[S.players.length,"Players"],[`$${S.players.length*S.cfg.buyIn}`,"Pot"],[S.cfg.startingUnits,"Units"]].forEach(([v,l],i)=>{
    const s=D({style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",borderRight:i<2?"1px solid rgba(71,85,105,.3)":"none"}});
    s.appendChild(S2({style:{fontSize:"22px",fontWeight:800,color:"#fbbf24"}},String(v)));
    s.appendChild(S2({style:{fontSize:"9px",color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginTop:"2px"}},l));
    row.appendChild(s);
  });
  c.appendChild(row);
  c.appendChild(D({style:{fontSize:"11px",color:hasBackend?"#4ade80":"#64748b"}}, hasBackend ? "📡 Live lines enabled" : "⚠ No backend set — tap Commissioner → Setup to enable live lines"));
  c.appendChild(B({style:{background:"linear-gradient(135deg,#15803d,#166534)",color:"#fff",borderRadius:"12px",padding:"13px 36px",fontSize:"15px",fontWeight:700,boxShadow:"0 0 20px rgba(34,197,94,.2)"},onClick:()=>{S.screen="select";render();}},"Enter League →"));
  w.appendChild(c);
  return w;
}

// ═══════════════════════════════════════
// PLAYER SELECT
// ═══════════════════════════════════════
function buildSelect() {
  const w = D({style:{minHeight:"100vh",background:"#020617",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}});
  w.appendChild(D({style:{position:"fixed",inset:0,background:"radial-gradient(ellipse 80% 60% at 50% 0%,rgba(20,83,45,.55),transparent 70%)",pointerEvents:"none"}}));
  w.appendChild(D({style:{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(30,58,47,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,47,.15) 1px,transparent 1px)",backgroundSize:"48px 48px",pointerEvents:"none"}}));
  const c = D({style:{position:"relative",zIndex:1,display:"flex",flexDirection:"column",padding:"32px 20px",maxWidth:"420px",width:"100%"}});
  c.appendChild(D({style:{fontSize:"24px",fontWeight:800,color:"#f1f5f9",marginBottom:"4px"}},"Who are you?"));
  c.appendChild(D({style:{fontSize:"13px",color:"#475569",marginBottom:"18px"}},"Tap your name to enter"));
  const grid = D({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",width:"100%",marginBottom:"18px"}});
  if (!S.players.length) grid.appendChild(D({style:{gridColumn:"span 2",color:"#334155",fontSize:"13px",textAlign:"center",padding:"24px",border:"1px dashed rgba(30,41,59,.5)",borderRadius:"12px"}},"No players yet — Commissioner must add players first."));
  S.players.forEach(p=>{
    const t=B({style:{background:"rgba(15,23,42,.9)",border:"1px solid rgba(30,58,47,.7)",borderRadius:"14px",padding:"18px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:"8px"},onClick:()=>{S.player=p;S.isComm=false;S.screen="app";render();}});
    t.appendChild(D({style:{width:"44px",height:"44px",borderRadius:"50%",background:ac(p.name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",fontWeight:800,color:"#fff"}},p.name[0].toUpperCase()));
    t.appendChild(S2({style:{fontSize:"14px",fontWeight:700,color:"#e2e8f0"}},p.name));
    grid.appendChild(t);
  });
  c.appendChild(grid);
  let pinVisible = false;
  const zone = D({style:{borderTop:"1px solid rgba(30,58,47,.4)",paddingTop:"16px"}});
  const cb = B({style:{background:"transparent",color:"#475569",border:"1px solid rgba(71,85,105,.35)",borderRadius:"10px",padding:"10px",width:"100%",fontSize:"14px"},onClick:()=>{pinVisible=true;cb.style.display="none";pa.style.display="flex";pi.focus();}},"👑 Commissioner Login");
  const pa = D({style:{display:"none",flexDirection:"column",gap:"8px"}});
  const pi = I({type:"password",maxlength:"6",placeholder:"Enter PIN",style:{background:"rgba(15,23,42,.9)",border:"1px solid rgba(30,58,47,.8)",borderRadius:"10px",padding:"10px 14px",fontSize:"15px",color:"#e2e8f0",width:"100%"}});
  const em = D({style:{color:"#ef4444",fontSize:"12px",textAlign:"center",display:"none"}},"Wrong PIN");
  const tryPin = () => { if(pi.value===PIN){S.player=null;S.isComm=true;S.screen="app";render();}else{em.style.display="block";pi.value="";setTimeout(()=>em.style.display="none",2000);} };
  const gb = B({style:{background:"#15803d",color:"#fff",borderRadius:"10px",padding:"10px 18px",fontSize:"18px"},onClick:tryPin},"→");
  pi.addEventListener("keydown",e=>{if(e.key==="Enter")tryPin();});
  const pr = D({style:{display:"flex",gap:"8px"}}); pr.appendChild(pi); pr.appendChild(gb);
  pa.appendChild(pr); pa.appendChild(em);
  pa.appendChild(D({style:{color:"#334155",fontSize:"11px",textAlign:"center"}},"Default PIN: 1234"));
  zone.appendChild(cb); zone.appendChild(pa);
  c.appendChild(zone);
  w.appendChild(c);
  return w;
}

// ═══════════════════════════════════════
// SHELL
// ═══════════════════════════════════════
function buildShell() {
  const bd = board(), me = S.player ? bd.find(p=>p.id===S.player.id) : null;
  const shell = D({style:{minHeight:"100vh",background:"#020617",display:"flex",flexDirection:"column",color:"#e2e8f0"}});

  // Topbar
  const bar = D({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px 8px",background:"rgba(2,6,23,.97)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(30,58,47,.5)",position:"sticky",top:0,zIndex:100}});
  const bl = D({});
  bl.appendChild(D({style:{fontSize:"17px",fontWeight:800,color:"#fbbf24"}},S.cfg.leagueName));
  bl.appendChild(D({style:{fontSize:"11px",color:"#4ade80",marginTop:"1px"}},`Week ${S.week} · $${S.players.length*S.cfg.buyIn} pot`));
  const br = D({style:{display:"flex",gap:"8px",alignItems:"center"}});
  const syncB = B({style:{background:"rgba(30,58,47,.5)",border:"1px solid rgba(34,197,94,.2)",borderRadius:"8px",width:"34px",height:"34px",display:"flex",alignItems:"center",justifyContent:"center",color:"#4ade80",fontSize:"16px"},onClick:doSync});
  syncB.appendChild(S2({style:{display:"inline-block",animation:S.syncing?"spin .8s linear infinite":"none"}},S.syncing?"⟳":"↻"));
  br.appendChild(syncB);
  if(S.isComm) br.appendChild(B({style:{background:"rgba(234,179,8,.08)",color:"#fbbf24",border:"1px solid rgba(234,179,8,.3)",borderRadius:"8px",padding:"6px 11px",fontSize:"12px",fontWeight:700},onClick:()=>{S.modal="lock";render();}},"Lock Week"));
  br.appendChild(B({style:{width:"34px",height:"34px",borderRadius:"50%",background:S.isComm?"linear-gradient(135deg,#b45309,#92400e)":`linear-gradient(135deg,${ac(S.player?.name)},${ac(S.player?.name)}bb)`,color:"#fff",fontSize:"14px",fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>{S.screen="select";S.player=null;S.isComm=false;render();}},S.isComm?"👑":(S.player?.name?.[0]?.toUpperCase()||"?")));
  bar.appendChild(bl); bar.appendChild(br); shell.appendChild(bar);

  // Context strip
  const ctx = D({style:{background:"rgba(15,23,42,.7)",borderBottom:"1px solid rgba(30,58,47,.3)",padding:"6px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
  if(S.isComm) ctx.appendChild(S2({style:{fontSize:"11px",color:"#94a3b8"}},"👑 Commissioner — full access"));
  else {
    const l=S2({style:{fontSize:"11px",color:"#94a3b8"}});
    l.innerHTML=`Playing as <strong style="color:#fbbf24">${S.player?.name||""}</strong>`;
    ctx.appendChild(l);
    if(me) ctx.appendChild(S2({style:{fontSize:"12px",fontWeight:700,color:me.bal>S.cfg.startingUnits?"#4ade80":me.bal<S.cfg.startingUnits?"#f87171":"#64748b"}},`${me.bal}u ${me.bal>S.cfg.startingUnits?"▲":me.bal<S.cfg.startingUnits?"▼":"—"}`));
  }
  shell.appendChild(ctx);

  // Content
  const content = D({style:{flex:1,overflowY:"auto",paddingBottom:"80px"}});
  const pages = {board:buildBoard,lines:buildLines,bets:buildBets,log:buildLog,history:buildHistory,recap:()=>buildRecap(bd),setup:S.isComm?buildSetup:buildBoard};
  content.appendChild((pages[S.tab]||buildBoard)(bd));
  shell.appendChild(content);

  // Nav
  const nav = h("nav",{style:{position:"fixed",bottom:0,left:0,right:0,background:"rgba(2,6,23,.97)",backdropFilter:"blur(16px)",borderTop:"1px solid rgba(30,58,47,.5)",display:"flex",zIndex:100,padding:"0 0 4px"}});
  [{id:"board",icon:"🏆",lbl:"Board"},{id:"lines",icon:"📡",lbl:"Lines"},{id:"bets",icon:"📋",lbl:"Bets"},{id:"log",icon:"✚",lbl:"Log"},{id:"history",icon:"📊",lbl:"History"},{id:"recap",icon:"📣",lbl:"Recap"},...(S.isComm?[{id:"setup",icon:"⚙",lbl:"Setup"}]:[])].forEach(n=>{
    const nb=B({style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"8px 2px 4px",color:S.tab===n.id?"#4ade80":"#334155"},onClick:()=>{S.tab=n.id;render();}});
    nb.appendChild(S2({style:{fontSize:"15px"}},n.icon));
    nb.appendChild(S2({style:{fontSize:"9px",fontWeight:700,letterSpacing:".04em"}},n.lbl));
    nav.appendChild(nb);
  });
  shell.appendChild(nav);

  if(S.toast){const t=D({style:{position:"fixed",bottom:"90px",left:"50%",transform:"translateX(-50%)",color:"#fff",borderRadius:"10px",padding:"11px 20px",fontSize:"14px",fontWeight:600,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,.5)",border:`1px solid ${S.toast.type==="err"?"#ef4444":"#22c55e"}`,background:S.toast.type==="err"?"#991b1b":"#14532d",whiteSpace:"nowrap"}},S.toast.msg);shell.appendChild(t);}
  if(S.modal==="lock") shell.appendChild(buildLockModal(bd));
  if(S.slip) shell.appendChild(buildSlip());
  return shell;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
async function doSync() {
  if (!getBackend()) { toast("Add your backend URL in Setup first","err"); return; }
  S.syncing=true; render();
  const sport=S.linesSport||S.cfg.sport;
  const [{data:games},{data:scores}] = await Promise.all([fetchOdds(sport,"odds"),fetchOdds(sport,"scores")]);
  if(Array.isArray(games)){S.lines=games;S.linesError=null;}
  let n=0;
  if(Array.isArray(scores)){
    S.bets=S.bets.map(bet=>{
      if(bet.result!=="Pending"||!bet.gameId) return bet;
      const sc=scores.find(s=>s.id===bet.gameId); if(!sc?.completed) return bet;
      const hs=sc.scores?.find(s=>s.name===sc.home_team)?.score, as=sc.scores?.find(s=>s.name===sc.away_team)?.score;
      if(hs==null||as==null) return bet;
      const d=bet.description.toLowerCase(),hw=+hs>+as,aw=+as>+hs,mh=d.includes(sc.home_team.toLowerCase()),ma=d.includes(sc.away_team.toLowerCase());
      let result=bet.result;
      if(mh&&hw)result="Win";else if(mh&&aw)result="Loss";else if(ma&&aw)result="Win";else if(ma&&hw)result="Loss";
      if(result!==bet.result){n++;return{...bet,result};}
      return bet;
    });
  }
  save(); S.syncing=false;
  toast(n>0?`Synced — settled ${n} bet${n>1?"s":""}! ✅`:"Synced ✅");
}

async function loadLines(sport) {
  if (!getBackend()) { S.linesError="no_backend"; S.lines=[]; S.linesLoading=false; S.linesSport=sport; render(); return; }
  S.linesLoading=true; S.linesError=null; S.lines=[]; S.linesSport=sport; render();
  const {data,error}=await fetchOdds(sport,"odds");
  S.linesLoading=false;
  if(Array.isArray(data)){S.lines=data;S.linesError=null;}
  else S.linesError=error||"unknown";
  render();
}

function endWeek() {
  const bd2=board(),w2=wb(),top=bd2[0];
  const best=w2.filter(b=>b.result==="Win").sort((a,b)=>ip(+a.odds)-ip(+b.odds))[0]||null;
  const worst=w2.filter(b=>b.result==="Loss").sort((a,b)=>b.units-a.units)[0]||null;
  S.weeks=[...S.weeks.filter(x=>x.week!==S.week),{week:S.week,winner:top?.name||"TBD",winnerId:top?.id,winnerBal:top?.bal,pot:S.players.length*S.cfg.buyIn,standings:bd2.map(p=>({id:p.id,name:p.name,bal:p.bal})),best,worst,date:new Date().toLocaleDateString()}];
  S.week++; S.modal=null; save();
  toast(`Week ${S.week-1} locked! ${top?.name||"TBD"} wins! 🏆`);
  S.tab="recap"; render();
}

// ═══════════════════════════════════════
// BOARD
// ═══════════════════════════════════════
function buildBoard(bd2) {
  if(!bd2) bd2=board();
  const w2=wb(),won=w2.filter(b=>b.result==="Win").length,lost=w2.filter(b=>b.result==="Loss").length,live=w2.filter(b=>b.result==="Pending").length;
  const pg=D({style:{padding:"18px 16px",display:"flex",flexDirection:"column",gap:"14px",maxWidth:"720px",margin:"0 auto",width:"100%"}});
  const hero=D({style:{background:"linear-gradient(135deg,rgba(20,83,45,.4),rgba(6,78,59,.3))",border:"1px solid rgba(34,197,94,.2)",borderRadius:"20px",padding:"24px 20px",textAlign:"center"}});
  hero.appendChild(D({style:{fontSize:"10px",fontWeight:700,color:"#4ade80",letterSpacing:".14em",textTransform:"uppercase"}},"THIS WEEK'S POT"));
  hero.appendChild(D({style:{fontSize:"50px",fontWeight:800,color:"#fbbf24",letterSpacing:"-2px",lineHeight:"1.1",margin:"6px 0"}},`$${S.players.length*S.cfg.buyIn}`));
  hero.appendChild(D({style:{fontSize:"12px",color:"#475569"}},`Week ${S.week} · ${S.players.length} players · ${S.cfg.startingUnits} units each`));
  const hs=D({style:{display:"flex",justifyContent:"center",gap:"12px",marginTop:"8px",fontSize:"13px"}});
  hs.appendChild(S2({style:{color:"#4ade80",fontWeight:700}},`${won}W`));
  hs.appendChild(S2({style:{color:"#334155"}},"·"));
  hs.appendChild(S2({style:{color:"#f87171",fontWeight:700}},`${lost}L`));

    const pl3=players.find(p=>p.id===spid);

  setTimeout(()=>ui.focus(),150);

  const mbi=I({type:"number",style:IS}); mbi.value=S.cfg.maxBet; mbi.addEventListener("change",e=>{S.cfg.maxBet=+e.target.value;save();});
  tc.appendChild(fld("Starting Units",sui)); tc.appendChild(fld("Max Bet",mbi)); card.appendChild(tc);
  const bii=I({type:"number",style:IS}); bii.value=S.cfg.buyIn; bii.addEventListener("change",e=>{S.cfg.buyIn=+e.target.value;save();}); card.appendChild(fld("Buy-In Per Player ($)",bii));
  const spsel=SL({style:{...IS,cursor:"pointer"}}); Object.keys(SMAP).forEach(s=>{const o=h("option",{value:s},s);if(s===S.cfg.sport)o.selected=true;spsel.appendChild(o);}); spsel.addEventListener("change",e=>{S.cfg.sport=e.target.value;save();}); card.appendChild(fld("Default Sport",spsel));

  // Backend URL — the key section
  card.appendChild(div2());
  card.appendChild(sec("Live Lines Backend"));
  const curBackend = getBackend();
  const statusBox = D({style:{background:curBackend?"rgba(34,197,94,.08)":"rgba(234,179,8,.08)",border:`1px solid ${curBackend?"rgba(34,197,94,.25)":"rgba(234,179,8,.25)"}`,borderRadius:"10px",padding:"12px 14px",fontSize:"13px",color:curBackend?"#4ade80":"#fbbf24",lineHeight:"1.6"}});
  statusBox.innerHTML = curBackend
    ? `✅ Backend connected: <span style="color:#e2e8f0;font-size:12px">${curBackend}</span>`
    : `⚠ No backend set — live lines won't work until you deploy and paste your Vercel URL below.`;
  card.appendChild(statusBox);

  const steps=D({style:{background:"rgba(30,41,59,.4)",borderRadius:"10px",padding:"14px",fontSize:"12px",color:"#64748b",lineHeight:"1.8"}});
  steps.innerHTML=`<strong style="color:#e2e8f0">How to get live lines (3 min, free):</strong><br>
1. Go to <strong style="color:#4ade80">vercel.com</strong> → sign up free<br>
2. Download the zip file from Claude's last message<br>
3. Create new project → upload the zip → Deploy<br>
4. Copy the URL Vercel gives you (e.g. <span style="color:#94a3b8">https://my-league.vercel.app</span>)<br>
5. Paste it below and tap Save`;
  card.appendChild(steps);

  const bui=I({type:"text",placeholder:"https://your-app.vercel.app",style:IS}); bui.value=curBackend;
  card.appendChild(fld("Your Vercel Backend URL",bui));
  card.appendChild(B({style:{background:"linear-gradient(135deg,#15803d,#166534)",color:"#fff",borderRadius:"10px",padding:"11px",fontSize:"14px",fontWeight:700,width:"100%"},onClick:()=>{
    const v=bui.value.trim().replace(/\/$/,"");
    LS.s("blg:backend",v);
    toast(v?"✅ Backend saved! Go to Lines tab to test.":"Backend cleared.");
    render();
  }},"Save Backend URL"));

  // Players
  card.appendChild(div2());
  card.appendChild(sec("Players  ·  PIN: 1234"));
  const ar=D({style:{display:"flex",gap:"8px"}});
  const npi=I({type:"text",placeholder:"Player name…",style:{...IS,flex:1}});
  const ab=B({style:{background:"#15803d",color:"#fff",borderRadius:"10px",padding:"0 16px",fontSize:"14px",fontWeight:700,whiteSpace:"nowrap"},onClick:()=>{
    const n=npi.value.trim();
    if(!n)return;
    if(S.players.find(p=>p.name.toLowerCase()===n.toLowerCase())){toast("Already exists","err");return;}
    S.players=[...S.players,{id:uid(),name:n,joinedWeek:S.week}];
    save(); npi.value=""; toast(`${n} added!`); render();
  }},"Add");
  npi.addEventListener("keydown",e=>{if(e.key==="Enter")ab.click();});
  ar.appendChild(npi); ar.appendChild(ab); card.appendChild(ar);
  S.players.forEach(p=>{
    const row=D({style:{display:"flex",alignItems:"center",gap:"10px",background:"rgba(2,6,23,.6)",borderRadius:"10px",padding:"9px 12px"}});
    row.appendChild(D({style:{width:"30px",height:"30px",borderRadius:"50%",background:ac(p.name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:800,color:"#fff"}},p.name[0].toUpperCase()));
    row.appendChild(S2({style:{color:"#e2e8f0",fontWeight:600,flex:1}},p.name));
    row.appendChild(B({style:{background:"rgba(127,29,29,.25)",color:"#f87171",border:"1px solid rgba(239,68,68,.18)",borderRadius:"7px",padding:"4px 9px",fontSize:"12px"},onClick:()=>{
      if(S.bets.some(b=>b.playerId===p.id)){toast("Can't remove player with logged bets","err");return;}
      S.players=S.players.filter(x=>x.id!==p.id); save(); render();
    }},"Remove"));
    card.appendChild(row);
  });
  if(!S.players.length) card.appendChild(D({style:{color:"#475569",fontSize:"13px"}},"No players yet."));
  pg.appendChild(card); return pg;
}

// ═══════════════════════════════════════
// LOCK MODAL
// ═══════════════════════════════════════
function buildLockModal(bd2) {
  const top=bd2[0];
  const ov=D({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}});
  ov.addEventListener("click",()=>{S.modal=null;render();});
  const box=D({style:{background:"#0f172a",border:"1px solid rgba(30,58,47,.8)",borderRadius:"20px",padding:"28px 24px",maxWidth:"380px",width:"100%"}});
  box.addEventListener("click",e=>e.stopPropagation());
  box.appendChild(D({style:{fontSize:"34px",marginBottom:"7px"}},"🏁"));
  box.appendChild(D({style:{fontSize:"19px",fontWeight:800,color:"#f1f5f9",marginBottom:"7px"}},`Lock Week ${S.week}?`));
  const body=D({style:{fontSize:"14px",color:"#94a3b8",lineHeight:"1.65"}});
  if(top) body.innerHTML=`<strong style="color:#fbbf24">${top.name}</strong> leads with <strong style="color:#4ade80">${top.bal}u</strong> — takes the <strong style="color:#fbbf24">$${S.players.length*S.cfg.buyIn} pot</strong>.`;
  else body.textContent="No players yet.";
  box.appendChild(body);
  const br2=D({style:{display:"flex",gap:"10px",marginTop:"20px"}});
  br2.appendChild(B({style:{flex:1,background:"transparent",color:"#475569",border:"1px solid rgba(71,85,105,.3)",borderRadius:"10px",padding:"10px",fontSize:"14px"},onClick:()=>{S.modal=null;render();}},"Cancel"));
  br2.appendChild(B({style:{flex:2,background:"linear-gradient(135deg,#15803d,#166534)",color:"#fff",borderRadius:"10px",padding:"10px",fontSize:"14px",fontWeight:700},onClick:endWeek},`Lock & Start Week ${S.week+1}`));
  box.appendChild(br2); ov.appendChild(box); return ov;
}

// Boot
render();
</script>
